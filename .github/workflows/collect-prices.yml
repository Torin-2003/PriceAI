name: Collect Prices

on:
  schedule:
    # 每 30 分钟跑一次（GitHub Actions cron 用 UTC，最小粒度 5 分钟，但官方建议 ≥ 10 分钟）
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

concurrency:
  group: collect-prices
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger collect-prices endpoint
        env:
          ENDPOINT: ${{ secrets.COLLECT_PRICES_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$ENDPOINT" ] || [ -z "$CRON_SECRET" ]; then
            echo "缺少 COLLECT_PRICES_URL 或 CRON_SECRET secret"
            exit 1
          fi
          response=$(curl -sS -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$ENDPOINT")
          body=$(printf '%s' "$response" | sed '$d')
          status=$(printf '%s' "$response" | tail -n1)
          echo "HTTP $status"
          echo "$body" | head -c 4000
          echo
          if [ "$status" != "200" ]; then
            exit 1
          fi

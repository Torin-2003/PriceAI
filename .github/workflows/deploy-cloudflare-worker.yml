name: Deploy Cloudflare Worker

on:
  workflow_dispatch:
    inputs:
      smoke_base_url:
        description: "URL to smoke test after deployment"
        required: false
        default: "https://priceai.cc"

jobs:
  deploy-cloudflare-worker:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_SMOKE_BASE_URL: ${{ inputs.smoke_base_url }}
      NEXT_DEPLOYMENT_ID: ${{ github.sha }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      ADMIN_SESSION_SECRET: ${{ secrets.ADMIN_SESSION_SECRET }}
      ADMIN_SESSION_VERSION: ${{ secrets.ADMIN_SESSION_VERSION }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
      NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
      NEXT_PUBLIC_UMAMI_SCRIPT_URL: ${{ vars.NEXT_PUBLIC_UMAMI_SCRIPT_URL }}
      NEXT_PUBLIC_UMAMI_WEBSITE_ID: ${{ vars.NEXT_PUBLIC_UMAMI_WEBSITE_ID }}
      NEXT_PUBLIC_UMAMI_ALLOWED_DOMAINS: ${{ vars.NEXT_PUBLIC_UMAMI_ALLOWED_DOMAINS }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - uses: supabase/setup-cli@v1
        with:
          version: 2.98.2

      - run: npm run check:cloudflare-env

      - name: Apply Supabase migrations
        run: |
          set -euo pipefail

          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "Missing SUPABASE_ACCESS_TOKEN secret"
            exit 1
          fi

          PROJECT_REF=$(node <<'NODE'
          const raw = process.env.NEXT_PUBLIC_SUPABASE_URL;
          if (!raw) {
            throw new Error("Missing NEXT_PUBLIC_SUPABASE_URL");
          }
          console.log(new URL(raw).hostname.split(".")[0]);
          NODE
          )

          mkdir -p supabase/.temp
          printf '%s' "$PROJECT_REF" > supabase/.temp/project-ref
          supabase db push --yes

      - run: npm run lint

      - run: npm run build:cloudflare

      - run: npm run deploy:cloudflare

      - run: npm run smoke:cloudflare -- "$CLOUDFLARE_SMOKE_BASE_URL"

name: Update README Star History

on:
  schedule:
    - cron: "17 1 * * *"
  workflow_dispatch:

concurrency:
  group: update-star-history
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Generate star history SVG
        env:
          GITHUB_TOKEN: ${{ github.token }}
          STAR_HISTORY_REPOSITORY: dimthink/PriceAI
        run: node scripts/update-star-history.mjs

      - name: Commit updated chart
        run: |
          set -euo pipefail

          if git diff --quiet -- assets/priceai-star-history.svg; then
            echo "Star history chart is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/priceai-star-history.svg
          git commit -m "docs: refresh star history chart"
          git push
